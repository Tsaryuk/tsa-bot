version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Route ONLY OpenAI API requests through Tor/Privoxy (bypasses Russian IP block)
      # Other traffic (yt-dlp, Instagram, etc.) goes directly — no HTTPS_PROXY here
      - OPENAI_PROXY=http://host.docker.internal:8118
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist downloaded temp files across restarts
      - downloads:/tmp/tsa-bot-downloads
      # Cache the Whisper model weights so they are not re-downloaded on restart
      - whisper_cache:/root/.cache/huggingface
    # Limit memory usage — increase if using large Whisper models
    mem_limit: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  downloads:
  whisper_cache:
